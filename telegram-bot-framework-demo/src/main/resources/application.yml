telegram:
  bot:
    token: ${BOT_TOKEN}
    mode: polling
    polling:
      enabled: true
      timeout: 30
      limit: 100
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false
      path: /telegram/webhook

---
spring:
  config:
    activate:
      on-profile: polling

telegram:
  bot:
    mode: polling
    polling:
      enabled: true
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: webhook

telegram:
  bot:
    mode: webhook
    polling:
      enabled: false
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: true
      path: /telegram/webhook
      public-url: ${BOT_WEBHOOK_PUBLIC_URL}
      secret-token: ${BOT_WEBHOOK_SECRET_TOKEN:}
      drop-pending-updates: true

demo:
  stage5:
    paid-media:
      file-id: ${DEMO_PAID_MEDIA_FILE_ID:}
      type: ${DEMO_PAID_MEDIA_TYPE:photo}
      star-count: ${DEMO_PAID_MEDIA_STAR_COUNT:1}
    gifts:
      gift-id: ${DEMO_GIFT_ID:}
      premium-month-count: ${DEMO_PREMIUM_MONTH_COUNT:3}
    channel-subscription:
      chat-id: ${DEMO_CHANNEL_CHAT_ID:}
      name: ${DEMO_CHANNEL_SUB_NAME:Demo subscription}
      price: ${DEMO_CHANNEL_SUB_PRICE:500}
    business:
      connection-id: ${DEMO_BUSINESS_CONNECTION_ID:}
      story-file-id: ${DEMO_BUSINESS_STORY_FILE_ID:}
