telegram:
  bot:
    token: ${BOT_TOKEN}
    mode: polling
    transport:
      mode: cloud
      base-url: https://api.telegram.org
      local-file-uri-upload-enabled: true
    diagnostics:
      enabled: true
    state:
      storage: memory
      # storage: redis
      # redis:
      #   key-prefix: telegram:fsm
      #   ttl-seconds: 86400
    screen-state:
      storage: memory
      # storage: redis
      # redis:
      #   key-prefix: telegram:screen
      #   ttl-seconds: 86400
    polling:
      enabled: true
      timeout: 30
      limit: 100
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false
      path: /telegram/webhook

---
spring:
  config:
    activate:
      on-profile: polling

telegram:
  bot:
    mode: polling
    polling:
      enabled: true
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: webhook

telegram:
  bot:
    mode: webhook
    polling:
      enabled: false
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: true
      path: /telegram/webhook
      public-url: ${BOT_WEBHOOK_PUBLIC_URL}
      secret-token: ${BOT_WEBHOOK_SECRET_TOKEN:}
      drop-pending-updates: true

demo:
  diagnostics:
    enabled: false
  stage5:
    paid-media:
      file-id: ${DEMO_PAID_MEDIA_FILE_ID:}
      type: ${DEMO_PAID_MEDIA_TYPE:photo}
      star-count: ${DEMO_PAID_MEDIA_STAR_COUNT:1}
    gifts:
      gift-id: ${DEMO_GIFT_ID:}
      premium-month-count: ${DEMO_PREMIUM_MONTH_COUNT:3}
    channel-subscription:
      chat-id: ${DEMO_CHANNEL_CHAT_ID:}
      name: ${DEMO_CHANNEL_SUB_NAME:Demo subscription}
      price: ${DEMO_CHANNEL_SUB_PRICE:500}
    business:
      connection-id: ${DEMO_BUSINESS_CONNECTION_ID:}
      story-file-id: ${DEMO_BUSINESS_STORY_FILE_ID:}

---
spring:
  config:
    activate:
      on-profile: cloud

telegram:
  bot:
    transport:
      mode: cloud
      base-url: ${DEMO_CLOUD_BOTAPI_BASE_URL:https://api.telegram.org}

demo:
  diagnostics:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local

telegram:
  bot:
    transport:
      mode: local
      base-url: ${DEMO_LOCAL_BOTAPI_BASE_URL:http://127.0.0.1:8081}
      local-file-uri-upload-enabled: true

demo:
  diagnostics:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: fake

telegram:
  bot:
    mode: polling
    transport:
      mode: local
      base-url: ${DEMO_FAKE_BOTAPI_BASE_URL:http://127.0.0.1:18081}
      local-file-uri-upload-enabled: true
    polling:
      enabled: false
    webhook:
      enabled: false

demo:
  diagnostics:
    enabled: true
