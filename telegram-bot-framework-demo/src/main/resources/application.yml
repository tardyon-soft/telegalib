telegram:
  bot:
    token: ${BOT_TOKEN}
    mode: polling
    polling:
      enabled: true
      timeout: 30
      limit: 100
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false
      path: /telegram/webhook

---
spring:
  config:
    activate:
      on-profile: polling

telegram:
  bot:
    mode: polling
    polling:
      enabled: true
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: webhook

telegram:
  bot:
    mode: webhook
    polling:
      enabled: false
      allowed-updates:
        - message
        - callback_query
        - inline_query
        - chosen_inline_result
        - shipping_query
        - pre_checkout_query
        - business_connection
        - business_message
        - edited_business_message
        - deleted_business_messages
    webhook:
      enabled: true
      path: /telegram/webhook
      public-url: ${BOT_WEBHOOK_PUBLIC_URL}
      secret-token: ${BOT_WEBHOOK_SECRET_TOKEN:}
      drop-pending-updates: true
